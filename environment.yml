name: bactocat_env
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.10 # using this version for cplex compatibility
  - jupyterlab
  - pyomo
  - numpy=2.*
  - rdkit
  - cobra
  - pandas
  - scikit-learn
  - symengine
  - matplotlib
  - seaborn
  - pyarrow
  - fastparquet
  - pip
  - biopython
  - bioservices
  - tqdm
  - pubchempy
  - python-dotenv
  - loguru
  - pydantic>=2.0
  - pyyaml
  - pip:
      - fair-esm
      - torch
      - mygene
      - docplex